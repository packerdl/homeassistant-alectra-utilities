# Builds and pushes the Alectra Utilities Scraper image to Docker Hub.
#
# Required repository secrets:
#   DOCKERHUB_USERNAME  - Docker Hub username
#   DOCKERHUB_TOKEN     - Docker Hub access token (Read & Write permissions)
#
# To release: create a GitHub Release with tag "v1.0.0".

name: Build Scraper Image

on:
  release:
    types: [published]

env:
  IMAGE_NAME: packerdl/ha-alectra-scraper
  VERSION: ${{ github.event.release.tag_name }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Strip v prefix
        id: version
        run: echo "bare=${VERSION#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./alectra_scraper
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.bare }}
            ${{ env.IMAGE_NAME }}:latest
          build-args: |
            BUILD_VERSION=${{ steps.version.outputs.bare }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
